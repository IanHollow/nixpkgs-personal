name: Update packages

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

concurrency:
  group: package-updates
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
      - uses: DeterminateSystems/magic-nix-cache-action@55718cd9ebf1737a061487d5ada21abf31e99a98 # main
      - name: Update pinned sources
        run: nix develop -c python scripts/update-packages.py --all
      - name: Create an auto-merge pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "All package pins are current."
            exit 0
          fi

          branch="automation/package-updates-$(date -u +%F)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add pkgs scripts
          git commit -m "maint: update package sources"
          git push --set-upstream "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$branch"
          pr_url=$(gh pr create --base main --head "$branch" --title "maint: update package sources" --body "Automated package source updates.")
          gh pr merge "$pr_url" --auto --squash
